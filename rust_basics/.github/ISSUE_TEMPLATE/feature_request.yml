name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: ["airzhix"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! This helps make the project better.
        
        Before creating a feature request, please check:
        - [ ] Search existing issues to see if this has already been suggested
        - [ ] Consider if this feature aligns with the project's goals

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A brief summary of the feature you'd like to see.
      placeholder: One-line summary of the feature...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this feature solve? What use case does it address?
      placeholder: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: |
        A clear and concise description of what you want to happen.
        
        If applicable, describe alternatives you've considered.
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Details (Optional)
      description: Any implementation details or suggestions you have.
      placeholder: |
        If you have ideas about how this could be implemented, please share them here.
        
        This is optional but can be helpful for contributors.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: This feature aligns with the project's goals
          required: true
        - label: I understand that this is a volunteer-driven project
          required: true