name: Bug Report
description: Report a bug in the project
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: ["airzhix"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! This helps make the project better.
        
        Before creating an issue, please check:
        - [ ] Search existing issues to see if this has already been reported
        - [ ] Ensure you're using the latest version of the project

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide information about your environment:
        - OS: [e.g. Windows 10, macOS 12, Ubuntu 20.04]
        - Rust version: [e.g. rustc 1.70.0]
        - Cargo version: [e.g. cargo 1.70.0]
      placeholder: |
        OS: 
        Rust version:
        Cargo version:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Any additional information that might be helpful...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided all the requested information
          required: true
        - label: I understand that this is a volunteer-driven project
          required: true